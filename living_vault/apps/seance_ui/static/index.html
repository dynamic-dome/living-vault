<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>séance</title>
  <style>
    html,body{margin:0;height:100%;background:#0a0a0f;color:#cfe;font-family:'JetBrains Mono',monospace;overflow:hidden;}
    #wrap{display:grid;grid-template-columns:320px 1fr;height:100vh;min-height:0;}
    #side{border-right:1px solid #234;display:flex;flex-direction:column;min-height:0;min-width:0;}
    #tabs{display:flex;border-bottom:1px solid #234;}
    .tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;background:#13202c;border-right:1px solid #234;}
    .tab:last-child{border-right:none;}
    .tab.active{background:#1a2e1c;color:#cfe;font-weight:bold;}
    #list{flex:1;overflow:auto;padding:8px;font-size:12px;}
    .pageItem{padding:6px 8px;cursor:pointer;border-radius:3px;}
    .pageItem:hover{background:#1a1f2e;}
    .sessionItem{padding:8px 10px;cursor:pointer;border-radius:3px;border:1px solid #234;margin-bottom:6px;background:#0f1620;}
    .sessionItem:hover{background:#1a2532;}
    .sessionMeta{font-size:10px;opacity:.65;margin-top:2px;}
    #chat{display:flex;flex-direction:column;padding:12px;min-height:0;min-width:0;}
    #header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    #who{opacity:.85;font-size:12px;}
    #exportBtn{background:#235;color:#cfe;border:1px solid #347;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;}
    #exportBtn:disabled{opacity:.4;cursor:not-allowed;}
    #log{flex:1;overflow:auto;font-size:13px;line-height:1.5;}
    .msg{margin:8px 0;padding:8px 10px;border-radius:6px;}
    .msg.user{background:#13202c;}
    .msg.assistant{background:#1a2e1c;}
    .toolEvent{
      margin:6px 0 4px 12px;
      padding:4px 10px;
      border-left:2px solid #4a8;
      font-size:11px;
      font-style:italic;
      color:#9bd;
      opacity:.85;
    }
    .toolEvent.error{
      border-left-color:#c66;
      color:#daa;
    }
    .toolEvent .wikilink{
      color:#cfe;
      font-weight:bold;
    }
    .toolEvent.budgetWarning{
      border-left-color:#e80;
      color:#fc8;
    }
    /* Phase-10b: multi-select page picker + mode dropdown */
    .pageItem.selected{background:#234;border-left:3px solid #4a8;}
    #modeRow{padding:8px;border-top:1px solid #234;display:none;}
    #modeRow.visible{display:flex;gap:8px;align-items:center;font-size:11px;}
    #modeRow select{background:#13202c;color:#cfe;border:1px solid #234;padding:4px;font-family:inherit;font-size:11px;}
    #summonBtn{background:#1a3a1c;color:#cfe;border:1px solid #4a8;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;}
    #summonBtn:disabled{opacity:.4;cursor:not-allowed;}
    /* Phase-10b: persona-labeled assistant bubbles */
    .msg.persona{background:#1a2e1c;border-left:3px solid #4a8;padding-left:10px;}
    .personaLabel{font-size:10px;font-weight:bold;opacity:.85;margin-bottom:4px;}
    #form{display:flex;gap:8px;}
    #txt{flex:1;background:#13202c;border:1px solid #234;color:#cfe;padding:8px;border-radius:4px;font-family:inherit;}
    button{background:#235;color:#cfe;border:1px solid #347;padding:8px 14px;border-radius:4px;cursor:pointer;font-family:inherit;}
    button:disabled{opacity:.4;cursor:not-allowed;}
    #toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:#1a3a1c;border:1px solid #4a8;border-radius:6px;font-size:12px;display:none;z-index:50;max-width:60ch;}
  </style>
</head>
<body>
<div id="wrap">
  <div id="side">
    <div id="tabs">
      <div class="tab active" data-tab="pages" onclick="switchTab('pages')">pages</div>
      <div class="tab" data-tab="sessions" onclick="switchTab('sessions')">past sessions</div>
    </div>
    <div id="list"><div style="opacity:.6;font-size:11px;">loading…</div></div>
    <div id="modeRow">
      <label>mode:</label>
      <select id="modeSelect">
        <option value="roundrobin">round-robin</option>
        <option value="moderator">moderator (@-mention)</option>
        <option value="freeforall">free-for-all</option>
      </select>
      <button id="summonBtn" onclick="summonRoundtable()">summon roundtable</button>
    </div>
  </div>
  <div id="chat">
    <div id="header">
      <div id="who">no page summoned yet</div>
      <button id="exportBtn" disabled onclick="exportSession()">export to wiki</button>
    </div>
    <div id="log"></div>
    <form id="form"><input id="txt" autocomplete="off" placeholder="speak to the page…" disabled /><button id="send" disabled>say</button></form>
  </div>
</div>
<div id="toast"></div>
<script>
let sid = null;
let currentTab = "pages";

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  if (name === "pages") loadPages();
  else loadSessions();
}

let selectedPaths = new Set();

async function loadPages(){
  const r = await fetch("/api/pages"); const j = await r.json();
  const el = document.getElementById("list"); el.innerHTML = "";
  j.forEach(p => {
    const d = document.createElement("div"); d.className="pageItem";
    d.textContent = p.path;
    d.dataset.path = p.path;
    // Reapply visual selection state — the Set survives loadPages re-renders,
    // but the DOM is wiped, so without this we'd silently lose the .selected
    // class on tab-switch-back even though the Set still has the path.
    if (selectedPaths.has(p.path)) d.classList.add("selected");
    // Note: click fires twice before dblclick on a double-click (toggle in,
    // toggle out), then dblclick clears selection and runs legacy summon —
    // brief visual flicker is harmless.
    d.onclick = () => togglePageSelection(p.path, d);
    d.ondblclick = () => singleSummonOnDoubleClick(p.path);
    el.appendChild(d);
  });
  updateModeRow();
}

function togglePageSelection(path, el){
  if (selectedPaths.has(path)){
    selectedPaths.delete(path);
    el.classList.remove("selected");
  } else if (selectedPaths.size >= 8){
    toast("max 8 personas per roundtable");
    return;
  } else {
    selectedPaths.add(path);
    el.classList.add("selected");
  }
  updateModeRow();
}

function updateModeRow(){
  const row = document.getElementById("modeRow");
  if (selectedPaths.size >= 2){
    row.classList.add("visible");
  } else {
    row.classList.remove("visible");
  }
}

function singleSummonOnDoubleClick(path){
  selectedPaths.clear();
  document.querySelectorAll(".pageItem.selected").forEach(el => el.classList.remove("selected"));
  summon(path);  // legacy single-page summon (Phase-10a path)
}

async function summonRoundtable(){
  if (selectedPaths.size < 2){ toast("pick at least 2 pages"); return; }
  const mode = document.getElementById("modeSelect").value;
  const paths = [...selectedPaths];

  // Cost-disclaimer for free-for-all with ≥3 personas
  if (mode === "freeforall" && paths.length >= 3){
    const ok = confirm(`Free-for-all with ${paths.length} personas: ~${paths.length}× token cost per turn. Continue?`);
    if (!ok) return;
  }

  // Disable the summon button during the in-flight request to prevent
  // accidental duplicate submissions on a rapid double-click.
  const btn = document.getElementById("summonBtn");
  btn.disabled = true;
  let r;
  try {
    r = await fetch("/api/summon", {
      method:"POST",
      headers:{"content-type":"application/json"},
      body: JSON.stringify({paths, mode}),
    });
  } finally {
    btn.disabled = false;
  }
  if (!r.ok){ toast("summon failed: " + r.status); return; }
  const j = await r.json();
  sid = j.session_id;
  document.getElementById("who").textContent = `${mode} session with ${paths.length} personas`;
  document.getElementById("log").innerHTML = "";
  document.getElementById("txt").disabled = false;
  document.getElementById("send").disabled = false;
  document.getElementById("exportBtn").disabled = false;
  // Clear selection
  selectedPaths.clear();
  document.querySelectorAll(".pageItem.selected").forEach(el => el.classList.remove("selected"));
  updateModeRow();
}

async function loadSessions(){
  const r = await fetch("/api/sessions"); const j = await r.json();
  const el = document.getElementById("list"); el.innerHTML = "";
  if (j.length === 0) {
    el.innerHTML = '<div style="opacity:.5;padding:8px;font-size:11px;">no sessions yet — pick a page and start talking</div>';
    return;
  }
  j.forEach(s => {
    const d = document.createElement("div"); d.className="sessionItem";
    const date = (s.started_at || "").substring(0, 16).replace("T", " ");
    d.innerHTML = `<div>${s.page_path}</div><div class="sessionMeta">${date} | ${s.message_count} msgs</div>`;
    d.onclick = () => loadSessionIntoChat(s.id, s.page_path);
    el.appendChild(d);
  });
}

async function loadSessionIntoChat(sessionId, pagePath){
  const r = await fetch(`/api/sessions/${sessionId}`);
  if (!r.ok) { toast("could not load session"); return; }
  const j = await r.json();
  sid = sessionId;
  document.getElementById("who").textContent = "viewing past session: " + pagePath;
  document.getElementById("log").innerHTML = "";
  j.messages.forEach(m => {
    if (m.role === "tool_use"){
      try {
        const payload = JSON.parse(m.content);
        appendToolEvent({
          tool_name: payload.tool_name,
          tool_args: payload.tool_args,
          tool_result_summary: payload.tool_result_summary,
        }, 0, 1);
      } catch(e) {
        appendMsg("assistant", "(unreadable tool event)");
      }
    } else if (m.role === "assistant" && m.persona_path){
      // Phase-10b: render roundtable assistant rows with persona label
      appendPersonaBubble({
        persona_path: m.persona_path,
        text: m.content,
        color: hashColorJs(m.persona_path),
      });
    } else {
      appendMsg(m.role, m.content);
    }
  });
  document.getElementById("txt").disabled = false;
  document.getElementById("send").disabled = false;
  document.getElementById("exportBtn").disabled = false;
}

// Mirror Python hash_color() so historical replays show same colors as live.
function hashColorJs(path){
  const palette = ["#7adfd5","#a8e6cf","#c9b3ff","#ffd3a5","#fda4af","#fde68a","#bbf7d0","#a5d8ff"];
  let h = 0;
  for (let i = 0; i < path.length; i++) h += path.charCodeAt(i);
  return palette[h % palette.length];
}

async function summon(path){
  const r = await fetch("/api/summon",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({path})});
  if(!r.ok){ toast("summon failed: " + path); return; }
  const j = await r.json(); sid = j.session_id;
  document.getElementById("who").textContent = "speaking with: "+path+" — era "+(j.persona.era_marker||"unknown");
  document.getElementById("log").innerHTML = "";
  document.getElementById("txt").disabled = false;
  document.getElementById("send").disabled = false;
  document.getElementById("exportBtn").disabled = false;
  document.getElementById("txt").focus();
}

async function exportSession(){
  if (sid === null) return;
  const btn = document.getElementById("exportBtn");
  btn.disabled = true; btn.textContent = "exporting…";
  try {
    const r = await fetch(`/api/sessions/${sid}/export`, {method: "POST"});
    if (!r.ok) { toast("export failed"); return; }
    const j = await r.json();
    toast("exported to: " + j.exported_to);
  } finally {
    btn.disabled = false; btn.textContent = "export to wiki";
  }
}

function toast(text){
  const t = document.getElementById("toast");
  t.textContent = text;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 4000);
}

document.getElementById("form").onsubmit = async (ev) => {
  ev.preventDefault();
  if(sid===null) return;
  const txt = document.getElementById("txt");
  const userText = txt.value.trim(); if(!userText) return;
  txt.value="";
  appendMsg("user", userText);
  const r = await fetch("/api/say",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({session_id:sid,text:userText})});
  const j = await r.json();
  if (Array.isArray(j.tool_events)) {
    j.tool_events.forEach((te, idx) => appendToolEvent(te, idx, j.tool_events.length));
  }
  // Phase-10b: replies array (roundtable) takes priority over reply (single-mode)
  if (Array.isArray(j.replies)){
    j.replies.forEach(rep => appendPersonaBubble(rep));
  } else {
    appendMsg("assistant", j.reply || "(no reply)");
  }
};

function appendMsg(role, text){
  const log = document.getElementById("log");
  const d = document.createElement("div"); d.className="msg "+role; d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

function appendPersonaBubble(rep){
  const log = document.getElementById("log");
  const d = document.createElement("div");
  d.className = "msg persona";
  d.style.borderLeftColor = rep.color || "#4a8";
  const labelEl = document.createElement("div");
  labelEl.className = "personaLabel";
  labelEl.textContent = (rep.persona_path || "").split("/").pop().replace(/\.md$/, "");
  const textEl = document.createElement("div");
  textEl.textContent = rep.text || "";
  d.appendChild(labelEl);
  d.appendChild(textEl);
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function appendToolEvent(ev, idx, total){
  const log = document.getElementById("log");
  const d = document.createElement("div");
  d.className = "toolEvent";
  const summary = ev.tool_result_summary || {};
  if (summary.error){
    d.classList.add("error");
    d.textContent = `» ${ev.tool_name} failed: ${summary.error}`;
  } else {
    const path = (ev.tool_args && ev.tool_args.neighbor_path) || "?";
    const chars = summary.chars || 0;
    d.innerHTML = `» consulted <span class="wikilink">[[${escapeHtml(path)}]]</span> (${chars} chars)`;
    // Budget warning fires for events 7..10 ONLY when the entire turn produced
    // at most 10 events. If the soft-cap-rejection event (the 11th) made it
    // into the batch, total is 11 and the warning is suppressed for the whole
    // turn — by design: the explicit budget-exhausted error bubble already
    // tells the story without doubling the visual noise on each preceding event.
    if (idx + 1 >= 7 && total <= 10){
      d.classList.add("budgetWarning");
      d.innerHTML += ` <span style="opacity:.7">— nearing budget (${idx + 1}/10)</span>`;
    }
  }
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

loadPages();
</script>
</body>
</html>
